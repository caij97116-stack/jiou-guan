<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒馆插件工坊 - SillyTavern Plugin Creator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">酒馆插件工坊</h1>
                <p class="subtitle">SillyTavern Plugin Creator</p>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-type="extension">
                    <span class="nav-icon">&#9881;</span>
                    <span class="nav-label">扩展 Extension</span>
                </button>
                <button class="nav-item" data-type="character-card">
                    <span class="nav-icon">&#9786;</span>
                    <span class="nav-label">角色卡 Character Card</span>
                </button>
                <button class="nav-item" data-type="world-info">
                    <span class="nav-icon">&#128218;</span>
                    <span class="nav-label">世界书 World Info</span>
                </button>
                <button class="nav-item" data-type="theme">
                    <span class="nav-icon">&#127912;</span>
                    <span class="nav-label">主题 Theme</span>
                </button>
                <button class="nav-item" data-type="quick-reply">
                    <span class="nav-icon">&#9889;</span>
                    <span class="nav-label">快速回复 Quick Reply</span>
                </button>
            </nav>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <h2 id="current-title">扩展 Extension 创建器</h2>
                <div class="top-actions">
                    <button class="btn btn-secondary" id="btn-preview">预览代码</button>
                    <button class="btn btn-primary" id="btn-download">下载文件</button>
                </div>
            </header>
            <div class="content-area">
                <div class="editor-panel" id="editor-panel">
                </div>
                <div class="preview-panel hidden" id="preview-panel">
                    <div class="preview-header">
                        <h3>代码预览</h3>
                        <button class="btn btn-small" id="btn-close-preview">关闭</button>
                    </div>
                    <div class="preview-tabs" id="preview-tabs"></div>
                    <div class="preview-content" id="preview-content"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/utils/png.js"></script>
    <script src="js/utils/download.js"></script>
    <script src="js/generators/extension.js"></script>
    <script src="js/generators/character-card.js"></script>
    <script src="js/generators/world-info.js"></script>
    <script src="js/generators/theme.js"></script>
    <script src="js/generators/quick-reply.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
